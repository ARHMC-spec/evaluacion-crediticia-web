<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluador de Crédito</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Evaluador de Crédito 💳</h1>

<input type="number" id="edad" placeholder="Edad">
<input type="number" id="ingresos" placeholder="Ingresos">
<input type="number" id="monto" placeholder="Monto del crédito">
<input type="number" id="empleo" placeholder="Años de empleo">
<input type="number" id="historial" placeholder="Historial (0 o 1)">

<button onclick="evaluar()">Evaluar</button>

<p id="resultado"></p>

<script src="app.js"></script>

</body>
</html>
